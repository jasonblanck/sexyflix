<!DOCTYPE html>
<html lang="en">

<title>SEXFLIX 🎬</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--card:#16161e;--pink:#FF4DA6;--purple:#9B59FF;--gold:#FFD700;--teal:#00E5CC;--green:#00E676;--red:#FF4444;--muted:#7777aa;--text:#f0f0f8;--border:#ffffff12}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
.nav{background:rgba(10,10,15,.97);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:56px;position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(12px)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.12em;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;flex-shrink:0}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.ntab{background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;padding:7px 14px;border-radius:20px;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;white-space:nowrap}
.ntab:hover{color:var(--text);background:#fff1}
.ntab.on{background:linear-gradient(135deg,var(--pink),var(--purple));color:#000;font-weight:700}
.nav-right{display:flex;gap:10px;align-items:center;flex-shrink:0}
.srch{display:flex;align-items:center;gap:8px;background:#fff1;border:1px solid var(--border);border-radius:20px;padding:7px 14px}
.srch input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;width:150px}
.badge{background:#fff1;border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--muted);white-space:nowrap}
#browse{padding-top:56px;min-height:100vh}
#swipe-view{display:none;padding-top:80px;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding-bottom:40px}
#swipe-view.on{display:flex}
.hero{position:relative;height:520px;overflow:hidden;background:linear-gradient(135deg,#1a0a2e,#0a1a2e)}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.hero-slide.active{opacity:1}
.hero-slide-inner{position:absolute;inset:0;display:flex}
.hero-blur-bg{position:absolute;inset:-40px;width:calc(100% + 80px);height:calc(100% + 80px);object-fit:cover;filter:blur(40px) brightness(.25) saturate(1.6);display:block}
.hero-poster{position:absolute;right:8%;top:50%;transform:translateY(-50%);height:86%;width:auto;max-width:300px;object-fit:contain;border-radius:12px;box-shadow:0 32px 80px rgba(0,0,0,.9);z-index:1}
.hero-grad{position:absolute;inset:0;background:linear-gradient(90deg,var(--bg) 0%,rgba(10,10,15,.85) 40%,rgba(10,10,15,.2) 70%,transparent 100%),linear-gradient(0deg,var(--bg) 0%,transparent 35%);z-index:2}
.hero-content{position:absolute;bottom:0;left:0;padding:40px 40px 36px;width:62%;z-index:3}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,7vw,86px);letter-spacing:.04em;line-height:1;text-shadow:0 4px 40px #000;margin-bottom:12px}
.hero-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.hpill{background:rgba(0,0,0,.6);border:1px solid #fff3;border-radius:8px;padding:4px 12px;font-size:13px;color:#eee;font-weight:500}
.hpill-rt{background:rgba(200,50,50,.3);border-color:#ff666655;color:#ff9090}
.hpill-imdb{background:rgba(255,180,0,.2);border-color:#FFD70055;color:var(--gold)}
.hero-btns{display:flex;gap:10px}
.hbtn{padding:11px 24px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:.2s}
.hbtn-i{background:var(--text);color:#000}.hbtn-i:hover{background:#ccc}
.hbtn-a{background:rgba(255,255,255,.15);color:var(--text);border:1px solid #fff4}.hbtn-a:hover{background:rgba(255,255,255,.25)}
.hero-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border:1px solid #fff3;color:#fff;font-size:40px;line-height:1;width:48px;height:64px;cursor:pointer;z-index:4;transition:.2s;display:flex;align-items:center;justify-content:center;border-radius:6px}
.hero-arrow:hover{background:rgba(0,0,0,.85)}
.hero-arrow-l{left:16px}.hero-arrow-r{right:16px}
.hero-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:4}
.hdot{width:6px;height:6px;border-radius:50%;background:#fff4;cursor:pointer;transition:.3s}
.hdot.on{background:var(--pink);width:20px;border-radius:3px}
.filters{display:flex;gap:8px;padding:20px 36px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fchip{background:#fff1;border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.2s;font-family:'Inter',sans-serif;flex-shrink:0}
.fchip:hover{border-color:#fff3;color:var(--text)}
.fchip.on{background:linear-gradient(135deg,var(--pink),var(--purple));border-color:transparent;color:#000;font-weight:700}
.row{margin-bottom:36px}
.row-head{display:flex;align-items:center;gap:10px;padding:0 36px;margin-bottom:12px}
.row-accent{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.row-lbl{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.row-scroll{display:flex;gap:14px;padding:0 36px 8px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:#ffffff15 transparent}
.row-scroll::-webkit-scrollbar{height:3px}
.row-scroll::-webkit-scrollbar-thumb{background:#ffffff20;border-radius:2px}
.pcard{flex-shrink:0;width:154px;cursor:pointer;transition:transform .25s}
.pcard:hover{transform:translateY(-6px)}
.pcard:hover .pc-title{color:var(--pink)}
.pcard.wide{width:256px}
.pc-poster{border-radius:10px;overflow:hidden;position:relative;margin-bottom:10px;box-shadow:0 8px 24px rgba(0,0,0,.5);background:linear-gradient(135deg,#1a1a2e,#0d0d20)}
.pcard:not(.wide) .pc-poster{width:154px;height:231px}
.pcard.wide .pc-poster{width:256px;height:144px}
.pc-poster img{width:100%;height:100%;object-fit:cover;display:block}
.pc-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:12px;text-align:center;position:absolute;top:0;left:0}
.pc-ph span{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--muted);line-height:1.3}
.pc-seen{position:absolute;top:8px;left:8px;background:var(--gold);color:#000;font-size:8px;font-weight:800;letter-spacing:.06em;padding:3px 7px;border-radius:4px;text-transform:uppercase}
.pc-fav{position:absolute;top:6px;left:8px;font-size:22px;text-shadow:0 2px 8px rgba(0,0,0,.8);line-height:1}
.pc-title{font-size:13px;font-weight:600;line-height:1.3;color:var(--text);margin-bottom:3px;transition:.2s}
.pc-meta-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.pc-year{font-size:11px;color:var(--muted)}
.pc-type{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.pc-scores{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.cbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;border:1px solid}
.cbadge-rt{color:#ff8080;border-color:#ff444433;background:#ff444410}
.cbadge-imdb{color:var(--gold);border-color:#FFD70033;background:#FFD70010}
.pc-svcs{display:flex;flex-wrap:wrap;gap:4px}
.spill{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:4px;border:1px solid;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:opacity .15s}
.spill:hover{opacity:.7}
.sp-N{color:#E50914;border-color:#E5091455;background:#E5091412}
.sp-H{color:#b090e8;border-color:#b090e855;background:#b090e812}
.sp-D{color:#6DB3F2;border-color:#6DB3F255;background:#6DB3F212}
.sp-A{color:#e0e0e0;border-color:#66666655;background:#66666612}
.sp-P{color:#00A8E1;border-color:#00A8E155;background:#00A8E112}
.sp-U{color:#1CE783;border-color:#1CE78355;background:#1CE78312}
.sp-M{color:#4488FF;border-color:#4488FF55;background:#4488FF12}
.sp-T{color:var(--gold);border-color:#FFD70055;background:#FFD70012}
.sp-X{color:#aaa;border-color:#44444455;background:#44444412}
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:#13131c;border:1px solid var(--border);border-radius:18px;max-width:740px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:mIn .3s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(16px)}to{opacity:1;transform:none}}
.modal-top{display:flex;border-radius:18px 18px 0 0;overflow:hidden;background:#0d0d18}
.modal-poster{width:160px;flex-shrink:0;background:linear-gradient(135deg,#1a1a2e,#0d0d20)}
.modal-poster img{width:160px;height:240px;object-fit:cover;display:block}
.modal-poster-ph{width:160px;height:240px;display:flex;align-items:center;justify-content:center;padding:14px}
.modal-poster-ph span{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--muted);text-align:center;line-height:1.3}
.modal-info{flex:1;padding:24px;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(90deg,rgba(0,0,0,.65),transparent)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:.04em;line-height:1;margin-bottom:7px}
.modal-sub{font-size:13px;color:#aaa;margin-bottom:12px}
.modal-scores{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.ms{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:14px;font-size:12px;font-weight:600;border:1px solid}
.ms-g{color:var(--green);border-color:#00E67640;background:#00E67612}
.ms-r{color:var(--red);border-color:#FF444440;background:#FF444412}
.ms-y{color:var(--gold);border-color:#FFD70040;background:#FFD70012}
.modal-body{padding:20px 24px 24px}
.modal-plot{font-size:14px;color:#ccc;line-height:1.7;margin-bottom:18px}
.mlbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.where-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.wbtn{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid;cursor:pointer;text-decoration:none;transition:all .15s;font-family:'Inter',sans-serif}
.wbtn:hover{transform:translateY(-2px);opacity:.85}
.wb-N{color:#E50914;border-color:#E5091450;background:#E5091415}
.wb-H{color:#b090e8;border-color:#b090e850;background:#b090e815}
.wb-D{color:#6DB3F2;border-color:#6DB3F250;background:#6DB3F215}
.wb-A{color:#e0e0e0;border-color:#66666650;background:#66666615}
.wb-P{color:#00A8E1;border-color:#00A8E150;background:#00A8E115}
.wb-U{color:#1CE783;border-color:#1CE78350;background:#1CE78315}
.wb-M{color:#4488FF;border-color:#4488FF50;background:#4488FF15}
.wb-T{color:var(--gold);border-color:#FFD70050;background:#FFD70015}
.wb-X{color:#aaa;border-color:#55555550;background:#55555515}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap}
.mact{padding:10px 20px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:.2s}
.ma-fav{background:#FFD70018;color:var(--gold);border:1px solid #FFD70035}
.ma-fav.on{background:var(--gold);color:#000}
.ma-seen{background:#fff1;color:var(--text);border:1px solid var(--border)}
.ma-seen.on{background:#00E67618;color:var(--green);border-color:#00E67635}
.modal-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid #fff2;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;transition:.2s}
.modal-close:hover{background:#fff2}
.sw-hd h2{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.08em;background:linear-gradient(135deg,var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.sw-hd p{font-size:13px;color:var(--muted);text-align:center;margin-top:5px}
.arena{position:relative;width:min(320px,85vw);height:min(510px,68vh)}
.scard{position:absolute;inset:0;border-radius:20px;overflow:hidden;cursor:grab;user-select:none;background:var(--card);box-shadow:0 28px 72px rgba(0,0,0,.7);will-change:transform}

.stamp{position:absolute;border:4px solid;border-radius:10px;padding:5px 14px;font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:.1em;opacity:0;pointer-events:none}
.st-y{top:20px;right:14px;color:var(--green);border-color:var(--green);transform:rotate(-12deg)}
.st-n{top:20px;left:14px;color:var(--red);border-color:var(--red);transform:rotate(12deg)}
.sw-btns{display:flex;gap:18px;align-items:center}
.sbtn{width:56px;height:56px;border-radius:50%;border:2px solid;background:var(--bg);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:0 6px 24px rgba(0,0,0,.5)}

.sb-s{border-color:var(--red)}.sb-s:hover{background:var(--red)}
.sb-f{width:70px;height:70px;font-size:28px;border-color:var(--gold)}.sb-f:hover{background:var(--gold)}

<nav class="nav">
  <div class="logo" onclick="goBrowse()">SEXFLIX</div>
  <div class="nav-tabs">
    <button class="ntab on" onclick="goBrowse()">Browse</button>
    <button class="ntab" onclick="goSwipe()">🔥 Tonight?</button>
    <button class="ntab" onclick="goSeen()">✓ Seen</button>
    <button class="ntab" onclick="goFavs()">★ Favorites</button>

<div id="browse">
  <div class="hero" id="hero">
    <div id="hero-slides"></div>
    <div class="hero-grad"></div>
    <div class="hero-content">
      <div class="hero-title" id="hero-title">SEXFLIX</div>
      <div class="hero-meta" id="hero-meta"></div>
      <div class="hero-btns">
        <button class="hbtn hbtn-i" onclick="openHeroModal()">ⓘ More Info</button>
        <button class="hbtn hbtn-a" onclick="addHeroSeen()">+ Mark Seen</button>
      </div>
    </div>
    <button class="hero-arrow hero-arrow-l" onclick="goHero((heroIdx-1+heroSlides.length)%heroSlides.length)">&#8249;</button>
    <button class="hero-arrow hero-arrow-r" onclick="goHero((heroIdx+1)%heroSlides.length)">&#8250;</button>
    <div class="hero-dots" id="hero-dots"></div>
  </div>
  <div class="filters">
    <div class="fchip on" onclick="setG('all',this)">All</div>
    <div class="fchip" onclick="setG('movie',this)">🎬 Films</div>
    <div class="fchip" onclick="setG('series',this)">📺 Series</div>
    <div class="fchip" onclick="setG('documentary',this)">🎥 Docs</div>
    <div class="fchip" onclick="setG('standup',this)">🎤 Stand-Up</div>
    <div class="fchip" onclick="doSort('score')">⭐ Top Rated</div>
    <div class="fchip" onclick="doSort('year')">🆕 Newest</div>
    <div class="fchip" onclick="doSort('az')">A–Z</div>
  </div>
  <div id="rows"></div>
</div>
<div id="swipe-view">
  <div class="sw-hd"><h2>What Are We Watching Tonight?</h2><p>← skip · ★ double-tap · → watch tonight</p></div>

  <div class="sw-btns">
    <button class="sbtn sb-s" onclick="act('skip')">✕</button>
    <button class="sbtn sb-f" onclick="act('fav')">★</button>
    <button class="sbtn sb-y" onclick="act('yes')">✓</button>

</div>

const SURL={netflix:'https://www.netflix.com/search?q=','hbo max':'https://www.max.com/search?q=',max:'https://www.max.com/search?q=','disney+':'https://www.disneyplus.com/search?q=','apple tv+':'https://tv.apple.com/search?term=','amazon prime':'https://www.amazon.com/s?k=',hulu:'https://www.hulu.com/search?q=','paramount+':'https://www.paramountplus.com/search/',peacock:'https://www.peacocktv.com/search?q=',mubi:'https://mubi.com/en/films',tubi:'https://tubitv.com/search?q=',youtube:'https://www.youtube.com/results?search_query=','in theaters':'https://www.fandango.com/search?q='};
function sURL(n,t){const k=n.toLowerCase();for(const[key,u]of Object.entries(SURL))if(k.includes(key)||key.includes(k))return u+encodeURIComponent(t);return'https://www.google.com/search?q='+encodeURIComponent(t+' '+n);}
function sKey(n){const k=n.toLowerCase();if(k.includes('netflix'))return'N';if(k.includes('hbo')||k.includes('max'))return'H';if(k.includes('disney'))return'D';if(k.includes('apple'))return'A';if(k.includes('amazon')||k.includes('prime'))return'P';if(k.includes('hulu'))return'U';if(k.includes('paramount'))return'M';if(k.includes('theater'))return'T';return'X';}
function scC(imdb,rt){const n=rt?parseInt(rt):imdb?parseFloat(imdb)*10:0;if(n>=70)return'var(--green)';if(n>=50)return'var(--gold)';if(n>0)return'var(--red)';return'var(--muted)';}

function save(){localStorage.setItem('sx_w',JSON.stringify([...watched]));}

function buildHero(){
  const pool=MOVIES.filter(m=>m.p).sort(()=>Math.random()-.5).slice(0,8);
  heroSlides=pool;
  const sc=document.getElementById('hero-slides'),dc=document.getElementById('hero-dots');
  sc.innerHTML='';dc.innerHTML='';
  pool.forEach((m,i)=>{
    const div=document.createElement('div');
    div.className='hero-slide'+(i===0?' active':'');
    div.innerHTML=`<div class="hero-slide-inner"><img src="${m.p}" alt="" class="hero-blur-bg"><img src="${m.p}" alt="${m.t}" class="hero-poster" onerror="this.style.opacity='0'"></div>`;
    sc.appendChild(div);
    const dot=document.createElement('div');
    dot.className='hdot'+(i===0?' on':'');
    dot.onclick=()=>goHero(i);
    dc.appendChild(dot);
  });
  showHero(0);
  heroTimer=setInterval(()=>goHero((heroIdx+1)%heroSlides.length),6000);
}
function showHero(i){
  heroIdx=i;const m=heroSlides[i];heroRaw=m.t;
  document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.hdot').forEach((d,j)=>d.classList.toggle('on',j===i));
  document.getElementById('hero-title').textContent=m.t;
  const pills=[];
  if(m.y)pills.push(`<span class="hpill">${m.y}</span>`);
  if(m.type)pills.push(`<span class="hpill">${m.type}</span>`);
  if(m.rt)pills.push(`<span class="hpill hpill-rt">🍅 ${m.rt}</span>`);
  if(m.imdb)pills.push(`<span class="hpill hpill-imdb">⭐ ${m.imdb}</span>`);
  document.getElementById('hero-meta').innerHTML=pills.join('');
}
function goHero(i){clearInterval(heroTimer);showHero(i);heroTimer=setInterval(()=>goHero((heroIdx+1)%heroSlides.length),6000);}

function applyF(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  let pool=[...MOVIES];
  if(viewMode==='seen')pool=pool.filter(m=>watched.has(m.t));
  else if(viewMode==='fav')pool=pool.filter(m=>favs.has(m.t));
  if(gFilter!=='all')pool=pool.filter(m=>{const tp=(m.type||'').toLowerCase();if(gFilter==='standup')return tp==='standup';if(gFilter==='documentary')return tp==='documentary';if(gFilter==='series')return tp==='series';if(gFilter==='movie')return tp==='movie';return true;});
  if(q)pool=pool.filter(m=>m.t.toLowerCase().includes(q)||(m.plot||'').toLowerCase().includes(q));
  if(sortMode==='score')pool.sort((a,b)=>(parseFloat(b.imdb)||0)-(parseFloat(a.imdb)||0));
  else if(sortMode==='year')pool.sort((a,b)=>(parseInt(b.y)||0)-(parseInt(a.y)||0));
  else if(sortMode==='az')pool.sort((a,b)=>a.t.localeCompare(b.t));
  filtered=pool;renderRows();updateBadge();
}

function mkPills(stream,title,small=true){
  if(!stream||!stream.length)return'';
  return stream.map(s=>{const url=sURL(s,title),k=sKey(s);
    if(small)return`<a href="${url}" target="_blank" class="spill sp-${k}" onclick="event.stopPropagation()">${s}</a>`;
    return`<a href="${url}" target="_blank" class="wbtn wb-${k}" onclick="event.stopPropagation()">▶ ${s}</a>`;
  }).join('');
}
function mkCard(m,wide=false){
  const iw=watched.has(m.t),ifv=favs.has(m.t);
  const W=wide?256:154,H=wide?144:231;
  const te=encodeURIComponent(m.t);
  const rtB=m.rt?`<span class="cbadge cbadge-rt">🍅 ${m.rt}</span>`:'';
  const imdbB=m.imdb?`<span class="cbadge cbadge-imdb">⭐ ${m.imdb}</span>`:'';
  return`<div class="pcard${wide?' wide':''}" onclick="openModById('${te}')">
    <div class="pc-poster" style="width:${W}px;height:${H}px">
      ${m.p?`<img src="${m.p}" alt="${m.t}" style="width:${W}px;height:${H}px;object-fit:cover;display:block" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
      <div class="pc-ph" style="${m.p?'display:none':'display:flex'};width:${W}px;height:${H}px"><span>${m.t}</span></div>
      ${iw?'<div class="pc-seen">Seen</div>':ifv?'<div class="pc-fav">★</div>':''}
    </div>
    <div class="pc-title">${m.t}</div>
    <div class="pc-meta-row"><span class="pc-year">${m.y||''}</span><span class="pc-type">${m.type||''}</span></div>
    <div class="pc-scores">${rtB}${imdbB}</div>
    <div class="pc-svcs">${mkPills(m.stream,m.t,true)}</div>
  </div>`;
}
function openModById(te){const t=decodeURIComponent(te);const m=[...MOVIES,...TOP].find(x=>x.t===t);if(m)openMod(m);}
function renderRows(){
  const el=document.getElementById('rows');
  const mkRow=(label,color,items,wide=false)=>{
    if(!items.length)return'';
    return`<div class="row"><div class="row-head"><div class="row-accent" style="background:${color}"></div><div class="row-lbl">${label}</div></div><div class="row-scroll">${items.map(m=>mkCard(m,wide)).join('')}</div></div>`;
  };
  let html='';
  const isDefault=gFilter==='all'&&sortMode==='default'&&viewMode==='all'&&!document.getElementById('q').value;
  if(isDefault){
    const favList=filtered.filter(m=>favs.has(m.t));
    const seenList=filtered.filter(m=>watched.has(m.t));
    const unseen=filtered.filter(m=>!watched.has(m.t)&&!favs.has(m.t));
    const topRated=[...filtered].filter(m=>parseFloat(m.imdb)>=7.8||parseInt(m.rt)>=90).sort((a,b)=>(parseFloat(b.imdb)||0)-(parseFloat(a.imdb)||0)).slice(0,20);
    if(favList.length)html+=mkRow('★ Your Favorites','var(--gold)',favList);
    html+=mkRow('🎬 Your Watchlist','var(--teal)',unseen);
    html+=mkRow('🏆 Top Rated of All Time','var(--pink)',TOP,true);
    if(topRated.length)html+=mkRow('⭐ Best on Your List','var(--purple)',topRated,true);
    if(seenList.length)html+=mkRow('✓ Already Seen','var(--muted)',seenList);
  }else{
    html+=mkRow(filtered.length+' titles','var(--pink)',filtered,sortMode==='score');
    html+=mkRow('🏆 Top Rated of All Time','var(--pink)',TOP,true);
  }
  el.innerHTML=html||'<div style="padding:80px;text-align:center;color:var(--muted)">Nothing here</div>';
}
function openMod(m){
  if(!m)return;
  const iw=watched.has(m.t),ifv=favs.has(m.t);
  const rtN=m.rt?parseInt(m.rt):null;
  const rtClass=rtN!=null?(rtN>=60?'ms-g':'ms-r'):'ms-g';
  const te=encodeURIComponent(m.t);
  document.getElementById('mc').innerHTML=`
    <div class="modal-top">
      <div class="modal-poster">${m.p?`<img src="${m.p}" alt="${m.t}" style="width:160px;height:240px;object-fit:cover;display:block">`:`<div class="modal-poster-ph"><span>${m.t}</span></div>`}</div>
      <div class="modal-info">
        <div class="modal-title">${m.t}</div>
        <div class="modal-sub">${[m.y,m.type].filter(Boolean).join(' · ')}</div>
        <div class="modal-scores">
          ${m.rt?`<div class="ms ${rtClass}">🍅 ${m.rt} Rotten Tomatoes</div>`:''}
          ${m.imdb?`<div class="ms ms-y">⭐ ${m.imdb} / 10 IMDB</div>`:''}
        </div>
      </div>
    </div>
    <div class="modal-body">
      ${m.plot?`<div class="modal-plot">${m.plot}</div>`:''}
      <div class="mlbl">Where to Watch</div>
      <div class="where-row">${mkPills(m.stream,m.t,false)}</div>
      <div class="modal-actions">
        <button class="mact ma-fav${ifv?' on':''}" onclick="tFav('${te}',this)">${ifv?'★ Favorited':'☆ Favorite'}</button>
        <button class="mact ma-seen${iw?' on':''}" onclick="tSeen('${te}',this)">${iw?'✓ Seen It':'○ Mark as Seen'}</button>
      </div>
    </div>`;
  document.getElementById('mbg').classList.add('on');
}
function closeMod(){document.getElementById('mbg').classList.remove('on');}
function tSeen(te,btn){const t=decodeURIComponent(te);if(watched.has(t)){watched.delete(t);btn.classList.remove('on');btn.textContent='○ Mark as Seen';toast('Removed');}else{watched.add(t);btn.classList.add('on');btn.textContent='✓ Seen It';toast('Marked as seen ✓');}save();updateBadge();applyF();}
function tFav(te,btn){const t=decodeURIComponent(te);if(favs.has(t)){favs.delete(t);btn.classList.remove('on');btn.innerHTML='☆ Favorite';toast('Removed');}else{favs.add(t);btn.classList.add('on');btn.innerHTML='★ Favorited';toast('★ Favorited!');}saveFav();applyF();}
function initSwipe(){swQ=[...filtered].filter(m=>!watched.has(m.t)).sort(()=>Math.random()-.5);if(!swQ.length)swQ=[...filtered].sort(()=>Math.random()-.5);swI=0;renderStack();}
function renderStack(){
  const arena=document.getElementById('arena');arena.innerHTML='';
  document.getElementById('sc').textContent=swI<swQ.length?`${swI+1} / ${swQ.length}`:'';
  if(swI>=swQ.length){arena.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;text-align:center"><div style="font-size:52px">🎬</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.06em">All Done!</div><button onclick="swI=0;renderStack()" style="background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:#000;padding:11px 26px;border-radius:22px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer">Start Over</button></div>`;return;}
  for(let off=Math.min(2,swQ.length-swI-1);off>=0;off--){
    const m=swQ[swI+off];const card=document.createElement('div');card.className='scard';
    card.style.zIndex=3-off;card.style.transition='transform .3s ease,opacity .3s';
    card.style.transform=off===0?'none':off===1?'scale(0.96) translateY(12px) rotate(1.5deg)':'scale(0.92) translateY(24px) rotate(-1.5deg)';
    card.style.opacity=off===0?'1':off===1?'.75':'.5';
    const score=m.rt?'🍅 '+m.rt:m.imdb?'⭐ '+m.imdb:'';
    card.innerHTML=(m.p?`<img class="scard-img" src="${m.p}" alt="${m.t}" onerror="this.outerHTML='<div class=scard-ph><span>${m.t}</span></div>'">`:`<div class="scard-ph"><span>${m.t}</span></div>`)+
      `<div class="stamp st-y">WATCH IT</div><div class="stamp st-n">SKIP</div>
      <div class="scard-body"><div class="scard-title">${m.t}</div><div class="scard-sub">${[m.y,score].filter(Boolean).join(' · ')}</div>${m.plot?`<div class="scard-plot">${m.plot}</div>`:''}<div class="scard-svcs">${mkPills(m.stream,m.t,true)}</div></div>`;
    if(off===0){
      let sx=0;const stY=card.querySelector('.st-y'),stN=card.querySelector('.st-n');
      const down=x=>{sx=x;moving=true;};
      const move=x=>{if(!moving)return;const dx=x-sx;card.style.transition='none';card.style.transform=`translateX(${dx}px) rotate(${dx*.07}deg)`;stY.style.opacity=dx>40?Math.min((dx-40)/60,1):0;stN.style.opacity=dx<-40?Math.min((-dx-40)/60,1):0;};
      const up=x=>{if(!moving)return;moving=false;const dx=x-sx;if(dx>90)act('yes');else if(dx<-90)act('skip');else{card.style.transition='transform .4s';card.style.transform='none';stY.style.opacity=0;stN.style.opacity=0;}};
      card.addEventListener('mousedown',e=>{e.preventDefault();down(e.clientX);});
      window.addEventListener('mousemove',e=>{if(moving)move(e.clientX);});
      window.addEventListener('mouseup',e=>{if(moving)up(e.clientX);});
      card.addEventListener('touchstart',e=>down(e.touches[0].clientX),{passive:true});
      card.addEventListener('touchmove',e=>{e.preventDefault();move(e.touches[0].clientX);},{passive:false});
      card.addEventListener('touchend',e=>up(e.changedTouches[0].clientX));
      card.addEventListener('click',()=>{const now=Date.now();if(now-lastTap<350)act('fav');lastTap=now;});
    }
    arena.appendChild(card);
  }
}
function act(action){
  if(swI>=swQ.length)return;const m=swQ[swI];
  const top=document.querySelector('#arena .scard:last-child');
  if(top){top.style.transition='transform .4s ease,opacity .4s';if(action==='skip'){top.style.transform='translateX(-160%) rotate(-25deg)';top.style.opacity='0';}else if(action==='yes'){top.style.transform='translateX(160%) rotate(25deg)';top.style.opacity='0';}else{top.style.transform='translateY(-140%) scale(1.05)';top.style.opacity='0';}}
  if(action==='yes'){watched.add(m.t);save();toast('🎬 "'+m.t+'" — watching tonight!');}
  else if(action==='fav'){favs.add(m.t);saveFav();toast('★ "'+m.t+'" favorited!');}
  else toast('Skipped');
  swI++;updateBadge();applyF();setTimeout(renderStack,400);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('up');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('up'),2800);}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeMod();
  if(document.getElementById('swipe-view').classList.contains('on')){
    if(e.key==='ArrowLeft')act('skip');if(e.key==='ArrowRight')act('yes');if(e.key==='ArrowUp')act('fav');
  }
});
applyF();
</script>
</body>
</html>
